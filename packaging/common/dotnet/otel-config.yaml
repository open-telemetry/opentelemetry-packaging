# OpenTelemetry .NET Auto-Instrumentation Configuration
# This file provides default configuration for the .NET agent.
# See: https://opentelemetry.io/docs/zero-code/net/

# File-based configuration is experimental and may change.
# Set OTEL_EXPERIMENTAL_FILE_BASED_CONFIGURATION_ENABLED=true and
# OTEL_CONFIG_FILE to this file path to enable.

# Example configuration:
# file_format: "1.0"
#
# resource:
#   attributes:
#     service.name: "my-dotnet-service"
#
# tracer_provider:
#   processors:
#     - batch:
#         exporter:
#           otlp:
#             endpoint: "http://localhost:4317"
#
# Unlike environment-variable configuration, file-based configuration enables
# no instrumentations by default; list them explicitly:
#
# instrumentation/development:
#   dotnet:
#     traces:
#       httpclient: {}
#       aspnetcore: {}

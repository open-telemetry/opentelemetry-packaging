[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "opentelemetry-exporter-otlp-pyproto-http"
dynamic = ["version"]
description = "OpenTelemetry Collector pure-Python protobuf over HTTP Exporter (no google.protobuf)"
readme = "README.rst"
license = "Apache-2.0"
requires-python = ">=3.10"
dependencies = [
  "opentelemetry-api ~= 1.12",
  "opentelemetry-sdk ~= 1.12",
  "opentelemetry-exporter-otlp-pyproto-common == 1.44.0.dev",
]

[project.entry-points.opentelemetry_traces_exporter]
otlp_proto_http = "opentelemetry.exporter.otlp.proto.http.trace_exporter:OTLPSpanExporter"

[project.entry-points.opentelemetry_metrics_exporter]
otlp_proto_http = "opentelemetry.exporter.otlp.proto.http.metric_exporter:OTLPMetricExporter"

[project.entry-points.opentelemetry_logs_exporter]
otlp_proto_http = "opentelemetry.exporter.otlp.proto.http._log_exporter:OTLPLogExporter"

[dependency-groups]
dev = [
    "opentelemetry-proto == 1.44.0.dev",
    "opentelemetry-test-utils == 0.65b0.dev",
    "protobuf>=5.0",
    "pytest>=7.0",
]

[tool.uv.sources]
opentelemetry-proto = { workspace = true }
opentelemetry-test-utils = { workspace = true }

[tool.hatch.version]
path = "src/opentelemetry/exporter/otlp/_proto/http/version/__init__.py"

[tool.hatch.build.targets.sdist]
include = ["/src"]

[tool.hatch.build.targets.wheel]
packages = ["src/opentelemetry"]

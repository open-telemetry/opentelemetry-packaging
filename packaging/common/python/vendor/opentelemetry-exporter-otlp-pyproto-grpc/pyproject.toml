[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "opentelemetry-exporter-otlp-pyproto-grpc"
dynamic = ["version"]
description = "OpenTelemetry Collector pure-Python protobuf over gRPC Exporter (no google.protobuf)"
readme = "README.rst"
license = "Apache-2.0"
requires-python = ">=3.10"
dependencies = [
  "opentelemetry-api ~= 1.12",
  "opentelemetry-sdk ~= 1.12",
  "opentelemetry-exporter-otlp-pyproto-common == 1.44.0.dev",
]
# No grpcio: the gRPC transport is the pure-Python _pygrpc subpackage, so this
# exporter installs and runs without any compiled extension.

[project.entry-points.opentelemetry_traces_exporter]
otlp_proto_grpc = "opentelemetry.exporter.otlp.proto.grpc.trace_exporter:OTLPSpanExporter"

[project.entry-points.opentelemetry_metrics_exporter]
otlp_proto_grpc = "opentelemetry.exporter.otlp.proto.grpc.metric_exporter:OTLPMetricExporter"

[project.entry-points.opentelemetry_logs_exporter]
otlp_proto_grpc = "opentelemetry.exporter.otlp.proto.grpc._log_exporter:OTLPLogExporter"

[dependency-groups]
dev = [
    "pytest>=7.0",
]

[tool.hatch.version]
path = "src/opentelemetry/exporter/otlp/_proto/grpc/version/__init__.py"

[tool.hatch.build.targets.sdist]
include = ["/src"]

[tool.hatch.build.targets.wheel]
packages = ["src/opentelemetry"]
